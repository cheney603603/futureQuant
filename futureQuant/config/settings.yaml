# futureQuant 全局配置文件

# 项目信息
project_name: "futureQuant"
version: "0.1.0"

# LLM 配置
llm:
  provider: "openai"          # openai | ollama
  model: "gpt-4o-mini"
  temperature: 0.2
  max_tokens: 4096
  openai_api_key: ""          # 建议通过环境变量 FQ_LLM__OPENAI_API_KEY 注入
  openai_base_url: "https://api.openai.com/v1"
  ollama_base_url: "http://localhost:11434/v1"
  ollama_model: "qwen2.5:14b"
  max_retries: 3
  timeout: 120

# 数据配置
data:
  cache_dir: "./data_cache"
  db_path: "./data_cache/futures.db"
  update_time: "20:00"  # 每日更新时间
  mysql:
    enabled: true
    host: "127.0.0.1"
    port: 3306
    user: "novel_user"
    password: "novel_password"
    database: "futurequant"
    table: "daily_price"
    date_column: "date"
    symbol_column: "symbol"
    open_column: "open"
    high_column: "high"
    low_column: "low"
    close_column: "close"
    volume_column: "volume"
    open_interest_column: "open_interest"
  
  # akshare配置
  akshare_timeout: 30
  akshare_retry: 3
  
  # 爬虫配置
  crawler_delay: 5.0  # 请求间隔（秒）
  crawler_timeout: 30
  crawler_retry: 3

# 回测配置
backtest:
  initial_capital: 1000000
  commission: 0.0001  # 万1
  slippage: 1.0  # 滑点跳数
  margin_rate: 0.1  # 保证金率
  
  # 风控参数
  max_position_ratio: 0.8  # 最大仓位
  max_drawdown_limit: 0.2  # 最大回撤限制
  
  # 交易规则
  allow_short: true  # 允许做空
  trade_on_close: false  # 收盘价成交（否则开盘价）

# 因子配置
factor:
  normalize_method: "zscore"  # zscore, rank, minmax
  
  # 中性化
  industry_neutral: false
  market_neutral: true
  
  # 评估参数
  ic_lookback: 20
  quantile_groups: 5

# 模型配置
model:
  train_ratio: 0.7
  valid_ratio: 0.15
  test_ratio: 0.15
  n_splits: 5  # 时序交叉验证折数
  random_seed: 42

# 日志配置
logging:
  level: "INFO"
  log_dir: "./logs"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# 交易品种列表
varieties:
  # 黑色系
  - RB  # 螺纹钢
  - HC  # 热卷
  - I   # 铁矿石
  - J   # 焦炭
  - JM  # 焦煤
  
  # 有色金属
  - CU  # 铜
  - AL  # 铝
  - ZN  # 锌
  - NI  # 镍
  - SN  # 锡
  - AU  # 黄金
  - AG  # 白银
  
  # 化工品
  - TA  # PTA
  - MA  # 甲醇
  - PP  # 聚丙烯
  - L   # 聚乙烯
  - PVC # 聚氯乙烯
  - EG  # 乙二醇
  - EB  # 苯乙烯
  - PG  # 液化石油气
  
  # 油脂油料
  - M   # 豆粕
  - Y   # 豆油
  - P   # 棕榈油
  - OI  # 菜籽油
  - RM  # 菜粕
  
  # 农产品
  - CF  # 棉花
  - SR  # 白糖
  - RU  # 天然橡胶
  
  # 能源
  - SC  # 原油
  - LU  # 低硫燃料油
  - EC  # 集运指数
